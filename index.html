*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

button { cursor: pointer; font-family: inherit; }

@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

.btn-primary { background: var(--pro-gradient); color: #fff; }

.btn-lg { padding: 16px 36px; font-size: 16px; }

.card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }

.badge {

// ===========================

const API_BASE = '/api';
const CALENDAR_BASE = 'https://calendar.stagelink365.com/c';

async function apiGet(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

async function apiPost(path, body, authToken) {
  const headers = { 'Content-Type': 'application/json' };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const res = await fetch(`${API_BASE}${path}`, { method: 'POST', headers, body: JSON.stringify(body) });
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

async function apiPatch(path, body) {
  const res = await fetch(`${API_BASE}${path}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

// Auth state

const [editingProfileId, setEditingProfileId] = useState(null);
const [calendarPopupUrl, setCalendarPopupUrl] = useState(null);

// Fetch profiles from Airtable API
const fetchProfiles = useCallback(async () => {
  setLoadingProfiles(true);
  try {
    const data = await apiGet('/profiles');
    setLiveProfiles(data.profiles || []);
    setApiError(null);
  } catch (err) {
    console.warn('API not available, using sample data:', err.message);
    setApiError('api_unavailable');
    setLiveProfiles([]);
  }
  setLoadingProfiles(false);
}, []);

useEffect(() => { fetchProfiles(); }, [fetchProfiles]);
  
  // Auto-open create profile modal if linked from personnel page
useEffect(() => {
  const params = new URLSearchParams(window.location.search);
  if (params.get('action') === 'create-profile') {
    setShowCreateProfile(true);
    window.history.replaceState({}, '', window.location.pathname);
  }
}, []);

// Use live profiles if available, otherwise fall back to sample data
const profiles = liveProfiles.length > 0 ? liveProfiles : SAMPLE_PROFILES;
const isLiveData = liveProfiles.length > 0;

const viewProfile = (profile) => { setSelectedProfile(profile); setPage('profile'); window.scrollTo(0,0); };
const viewGig = (gig) => { setSelectedGig(gig); };

const handleLogin = (user) => { setCurrentUser(user); setShowLogin(false); setPage('dashboard'); };
const handleLogout = () => { setCurrentUser(null); setPage('home'); };

const handleProfileCreated = (result) => {
  setShowCreateProfile(false);
  fetchProfiles();
  if (result && result.profile) {
    setCurrentUser({ id: result.profile.id, name: result.profile.name, email: result.profile.email, role: 'performer', token: result.profile.token });
  }
  setPage('dashboard');
};

return (

{page === 'vendor-onboarding' && <VendorOnboarding setPage={setPage} />}

function Stars({ rating }) {
const full = Math.floor(rating);
const half = rating % 1 >= 0.5 ? 1 : 0;
const empty = 5 - full - half;
return (
<span className="stars">
{[...Array(full)].map((_, i) => <i key={`f${i}`} className="fa-solid fa-star"></i>)}
{half > 0 && <i className="fa-solid fa-star-half-stroke"></i>}
{[...Array(empty)].map((_, i) => <i key={`e${i}`} className="fa-regular fa-star empty"></i>)}
</span>
);
}

function BrowsePage({ searchQuery, setSearchQuery, filterCategory, setFilterCategory, filterLocation, setFilterLocation, filterAvailability, setFilterAvailability, filterTier, setFilterTier, onViewProfile, profiles, loading, isLiveData }) {
const filtered = useMemo(() => {
return profiles.filter(p => {
if (searchQuery) {
const q = searchQuery.toLowerCase();
const match = p.name.toLowerCase().includes(q) || p.subcategories.some(s => s.toLowerCase().includes(q)) || p.bio.toLowerCase().includes(q) || (p.genres && p.genres.some(g => g.toLowerCase().includes(q))) || p.skills.some(s => s.toLowerCase().includes(q));
if (!match) return false;
}
if (filterCategory !== 'all' && !(p.categories || [p.category]).includes(filterCategory)) return false;
if (filterLocation !== 'all' && p.location !== filterLocation) return false;
if (filterAvailability && !p.available) return false;
if (filterTier !== 'all' && p.tier !== filterTier) return false;
return true;
}).sort((a, b) => {
if (a.tier === 'premium' && b.tier !== 'premium') return -1;
if (b.tier === 'premium' && a.tier !== 'premium') return 1;
if (a.tier === 'pro' && b.tier === 'free') return -1;
if (b.tier === 'pro' && a.tier === 'free') return 1;
return b.rating - a.rating;
});
}, [searchQuery, filterCategory, filterLocation, filterAvailability, filterTier]);

return (

function LoginModal({ onClose, onSuccess }) {
const [loginToken, setLoginToken] = useState('');
const [loginError, setLoginError] = useState('');
const [loading, setLoading] = useState(false);

const handleLogin = async () => {
  if (!loginToken.trim()) { setLoginError('Please enter your access token'); return; }
  setLoading(true); setLoginError('');
  try {
    const data = await apiPost('/auth', { token: loginToken.trim() });
    if (data.authenticated) {
      onSuccess({ ...data.profile, role: data.role, token: loginToken.trim() });
    }
  } catch (err) {
    setLoginError('Invalid token. Check your magic link or contact TAD Shows.');
  }
  setLoading(false);
};

return (
<div className="modal-overlay" onClick={onClose}>
<div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 420 }}>
<div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
<h2 style={{ fontSize: 22, fontWeight: 700 }}>Log In to StageLink365</h2>
<button onClick={onClose} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', fontSize: 20, cursor: 'pointer' }}><i className="fa-solid fa-xmark"></i></button>
</div>
<div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
<div style={{ background: 'rgba(108,43,217,0.1)', padding: 16, borderRadius: 12, fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.6 }}>
<i className="fa-solid fa-wand-magic-sparkles" style={{ color: 'var(--primary-light)', marginRight: 6 }}></i>
StageLink365 uses <strong style={{ color: 'var(--text)' }}>magic link tokens</strong> instead of passwords. Enter your unique token below -- you received it when your profile was created.
</div>
<div>
<label style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: 6, display: 'block' }}>Your Access Token</label>
<input type="text" placeholder="e.g., tRd7xKm9Qw" value={loginToken} onChange={e => setLoginToken(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin()} style={{ fontFamily: 'monospace', fontSize: 16, letterSpacing: 1 }} />
</div>
{loginError && <div style={{ color: 'var(--danger)', fontSize: 13, padding: '8px 12px', background: 'rgba(239,68,68,0.1)', borderRadius: 8 }}><i className="fa-solid fa-circle-exclamation"></i> {loginError}</div>}
<button className="btn btn-primary" onClick={handleLogin} disabled={loading} style={{ width: '100%', justifyContent: 'center', marginTop: 8, opacity: loading ? 0.6 : 1 }}>
{loading ? 'Verifying...' : 'Log In'}
</button>
<div style={{ textAlign: 'center', fontSize: 13, color: 'var(--text-muted)' }}>
Don't have a token? Contact TAD Shows or <a href="#" style={{ color: 'var(--primary-light)' }}>create a new profile</a>.
</div>
</div>
</div>
</div>
);
}

function EditProfileModal({ profileId, token, onClose, onSaved }) {
const [loading, setLoading] = useState(true);
const [saving, setSaving] = useState(false);
const [error, setError] = useState('');
const [formData, setFormData] = useState({
  name: '', email: '', phone: '', category: [], subcategories: [], location: '', state: '',
  bio: '', rateMin: '', rateMax: '', rateType: '', yearsExp: '', travelRadius: '',
  genres: [], skills: [], unions: [], equipment: '', recentVenues: '', available: true,
  videoLink: '', showReelLink: '', audioLink: ''
});
const update = (key, val) => setFormData(prev => ({ ...prev, [key]: val }));
const toggleArrayItem = (key, item) => update(key, formData[key].includes(item) ? formData[key].filter(x => x !== item) : [...formData[key], item]);

useEffect(() => {
  if (!profileId) return;
  (async () => {
    try {
      const data = await apiGet(`/profile?id=${profileId}`);
      const p = data.profile;
      setFormData({
        name: p.name || '', email: p.email || '', phone: p.phone || '',
        category: p.categories || (p.category ? [p.category] : []), subcategories: p.subcategories || [],
        location: p.location || '', state: p.state || '',
        bio: p.bio || '', rateMin: p.rateMin || '', rateMax: p.rateMax || '', rateType: p.rateType || '',
        yearsExp: p.yearsExp || '', travelRadius: p.travelRadius || '',
        genres: p.genres || [], skills: p.skills || [], unions: p.unions || [],
        equipment: (p.equipment || []).join('\n'), recentVenues: (p.recentVenues || []).join('\n'),
        available: p.available !== false,
        videoLink: p.videoLink || '', showReelLink: p.showReelLink || '', audioLink: p.audioLink || ''
      });
    } catch (err) { setError('Could not load profile'); }
    setLoading(false);
  })();
}, [profileId]);

const handleSave = async () => {
  setSaving(true); setError('');
  try {
    const fields = {
      name: formData.name, email: formData.email, phone: formData.phone,
      category: formData.category, subcategories: formData.subcategories,
      location: formData.location, state: formData.state,
      bio: formData.bio, yearsExp: formData.yearsExp ? parseInt(formData.yearsExp) : undefined,
      travelRadius: formData.travelRadius ? parseInt(formData.travelRadius) : undefined,
      genres: formData.genres, skills: formData.skills, unions: formData.unions,
      equipment: formData.equipment.split('\n').filter(Boolean),
      recentVenues: formData.recentVenues.split('\n').filter(Boolean),
      available: formData.available,
      videoLink: formData.videoLink || '',
      showReelLink: formData.showReelLink || '',
      audioLink: formData.audioLink || ''
    };
    if (formData.rateMin) fields.rateMin = parseFloat(formData.rateMin);
    if (formData.rateMax) fields.rateMax = parseFloat(formData.rateMax);
    if (formData.rateType) fields.rateType = formData.rateType;
    await apiPatch('/profile', { id: profileId, fields, token });
    onSaved();
  } catch (err) { setError('Failed to save. Please try again.'); }
  setSaving(false);
};

if (loading) return (
<div className="modal-overlay"><div className="modal" style={{ textAlign: 'center', padding: 60 }}>
<i className="fa-solid fa-spinner fa-spin" style={{ fontSize: 32, color: 'var(--primary-light)', marginBottom: 16 }}></i>
<p style={{ color: 'var(--text-muted)' }}>Loading profile...</p>
</div></div>
);

return (
<div className="modal-overlay" onClick={onClose}>
<div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 640, maxHeight: '85vh', overflowY: 'auto' }}>
<div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
<h2 style={{ fontSize: 22, fontWeight: 700 }}>Edit Profile</h2>
<button onClick={onClose} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', fontSize: 20, cursor: 'pointer' }}><i className="fa-solid fa-xmark"></i></button>

{/* Basic Info */}
<div>

const updateForm = (key, val) => setForm(prev => ({ ...prev, [key]: val }));
const toggleItem = (list, setList, item) => setList(prev => prev.includes(item) ? prev.filter(x => x !== item) : [...prev, item]);
const addCustom = (val, list, setList, setInput) => { if (val.trim() && !list.includes(val.trim())) { setList(prev => [...prev, val.trim()]); } setInput(''); };

const addMember = () => setMembers(prev => [...prev, { name: '', role: '', email: '' }]);
const updateMember = (i, key, val) => setMembers(prev => prev.map((m, j) => j === i ? { ...m, [key]: val } : m));
const removeMember = (i) => setMembers(prev => prev.filter((_, j) => j !== i));

const goTo = (s) => { setStep(s); window.scrollTo(0, 0); };

// SUCCESS
if (submitted) {
  return (
    <div style={{ padding: '80px 24px', textAlign: 'center' }}>
      <div style={{ fontSize: 64, marginBottom: 16 }}>🎸</div>
      <h2 style={{ fontSize: 28, fontWeight: 800, marginBottom: 8 }}>Your Band is Live on StageLink365!</h2>
      <p style={{ color: 'var(--text-muted)', fontSize: 15, maxWidth: 460, margin: '0 auto 32px', lineHeight: 1.6 }}>Venues and bookers can now find {form.bandName || 'your band'}. Start exploring gigs or invite your members to claim their profiles.</p>
      <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
        <button className="btn btn-primary" onClick={() => setPage('gigs')}><i className="fa-solid fa-clipboard-list"></i> Browse Gigs</button>
        <button className="btn btn-accent" onClick={() => setPage('dashboard')}><i className="fa-solid fa-gauge-high"></i> Band Dashboard</button>
        <button className="btn btn-outline" onClick={() => setPage('browse')}><i className="fa-solid fa-search"></i> Browse Talent</button>
      </div>
    </div>
  );
}

return (
<div style={{ padding: '40px 24px 80px', maxWidth: 700, margin: '0 auto' }}>

    <p style={{ color: 'var(--text-muted)', fontSize: 14 }}>Get your band discovered by venues, agents, and bookers worldwide</p>
  </div>

  <OnboardingProgress step={step} totalSteps={totalSteps} labels={stepLabels} />

  {/* STEP 1: Band Info */}

      <OnboardingInput label="Your Role in the Band" placeholder="e.g., Band Leader, Manager, Lead Vocalist" value={form.contactRole} onChange={e => updateForm('contactRole', e.target.value)} />
      <OnboardingInput label="Phone Number" placeholder="+1 (555) 123-4567" value={form.phone} onChange={e => updateForm('phone', e.target.value)} />
      <OnboardingInput label="Based In" placeholder="City, State / Country" value={form.location} onChange={e => updateForm('location', e.target.value)} />

            <input placeholder="Email (optional)" value={m.email} onChange={e => updateMember(i, 'email', e.target.value)} style={{ flex: 2, minWidth: 140, padding: '10px 12px', background: 'var(--dark-lighter)', border: '1px solid var(--dark-border)', borderRadius: 8, color: 'var(--text)', fontSize: 13, outline: 'none' }} />
            {members.length > 1 && <span onClick={() => removeMember(i)} style={{ color: 'var(--danger)', cursor: 'pointer', fontSize: 18, padding: '0 4px', flexShrink: 0 }}>×</span>}
          </div>

        <button className="btn btn-outline btn-sm" onClick={addMember} style={{ marginTop: 4 }}><i className="fa-solid fa-plus" style={{ fontSize: 11 }}></i> Add Member</button>
      </div>

      <OnboardingBtnRow onNext={() => goTo(1)} />
    </OnboardingWizardCard>

  {/* STEP 2: Sound & Style */}
  {step === 1 && (

      <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 6 }}>Sound & Style</h2>

            <option value="per hour">Per Hour</option>
            <option value="per day">Per Day</option>
            <option value="per week">Per Week</option>

        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>

        <OnboardingAddRow value={customArea} onChange={e => setCustomArea(e.target.value)} onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), addCustom(customArea, selectedAreas, setSelectedAreas, setCustomArea))} onAdd={() => addCustom(customArea, selectedAreas, setSelectedAreas, setCustomArea)} placeholder="Add a custom region..." />
      </div>

      <OnboardingBtnRow onBack={() => goTo(1)} onNext={() => goTo(3)} />

        </div>
      </div>

      <div style={{ marginBottom: 20 }}>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 6 }}>Performance Video / Reel</label>
        <div style={{ border: '2px dashed var(--dark-border)', borderRadius: 12, padding: 28, textAlign: 'center', cursor: 'pointer', transition: 'border-color 0.3s' }}

        <OnboardingInput label="" placeholder="TikTok URL" value={form.tiktok} onChange={e => updateForm('tiktok', e.target.value)} />

      <OnboardingBtnRow onBack={() => goTo(2)} onNext={() => goTo(4)} nextLabel="Review" />
    </OnboardingWizardCard>
  )}

  {/* STEP 5: Review */}

    <OnboardingWizardCard>
      <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 6 }}>Review Your Band Profile</h2>
      <p style={{ color: 'var(--text-muted)', fontSize: 14, marginBottom: 24, lineHeight: 1.5 }}>Make sure everything looks good before going live.</p>

      {[
        { section: 'Band Info', rows: [
          { key: 'Band Name', val: form.bandName || '—', editStep: 0 },
          { key: 'Contact', val: form.contactName ? `${form.contactName} (${form.contactRole || 'Primary Contact'})` : '—', editStep: 0 },

          { key: 'Size', val: bandSize || '—', editStep: 0 },
          { key: 'Type', val: bandType || '—', editStep: 0 },
          { key: 'Members', val: members.filter(m => m.name).length > 0 ? members.filter(m => m.name).map(m => m.name).join(', ') : '—', editStep: 0 },

        { section: 'Sound & Style', rows: [
          { key: 'Genres', val: selectedGenres.length > 0 ? selectedGenres.slice(0, 4).join(', ') + (selectedGenres.length > 4 ? ` +${selectedGenres.length - 4} more` : '') : '—', editStep: 1 },

        <div key={si} style={{ marginBottom: 24 }}>
          <h4 style={{ fontSize: 12, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10, fontWeight: 600 }}>{section.section}</h4>
          {section.rows.map((row, ri) => (
            <div key={ri} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0', borderBottom: ri < section.rows.length - 1 ? '1px solid var(--dark-lighter)' : 'none' }}>

        <button className="btn btn-accent btn-lg" onClick={() => setSubmitted(true)} style={{ fontWeight: 700 }}>Launch Band Profile <i className="fa-solid fa-guitar" style={{ fontSize: 14 }}></i></button>
      </div>
    </OnboardingWizardCard>

];

const STAGE_FEATURES = [
'Full Stage with Wings', 'Thrust / Runway Stage', 'In-the-Round / 360°',
'Raised Platform / Riser', 'Floor-Level Performance Area',
'Outdoor Stage', 'Built-In Sound System', 'Built-In Lighting Rig',
'Backstage / Green Room', 'Loading Dock / Drive-In Access',
'Dressing Rooms', 'Monitor System', 'In-House Audio Engineer',
'In-House Lighting Tech', 'Grand Piano Available', 'Drum Kit Available',
'Backline Provided', 'Video / Projection System', 'Fly System / Rigging',
'Orchestra Pit'
];

const ENTERTAINMENT_NEEDS = [
'Live Bands / Musicians', 'Solo Performers / Singer-Songwriters',
'DJs', 'Comedians', 'Magicians / Variety Acts',
'Theatre / Musical Productions', 'Tribute / Cover Acts',
'Corporate Speakers / Emcees', 'Dance Performers',
'Kids / Family Entertainment', 'Ambient / Background Music',
'Full Production Shows', 'Cultural / Specialty Acts',
'Circus / Acrobatic Acts', 'Holiday / Seasonal Entertainment'
];

const BOOKING_FREQUENCY = [
'Daily', 'Multiple times per week', 'Weekly',
'Bi-weekly', 'Monthly', 'Seasonally', 'For special events only'
];

function VenueOnboarding({ setPage }) {
const [step, setStep] = useState(0);
const [form, setForm] = useState({ venueName: '', contactName: '', contactTitle: '', phone: '', email: '', address: '', city: '', stateCountry: '', website: '', bio: '', instagram: '', facebook: '', youtube: '', tiktok: '', budgetMin: '', budgetMax: '', budgetPer: 'per act' });
const [venueType, setVenueType] = useState(null);
const [capacity, setCapacity] = useState(null);
const [selectedStageFeatures, setSelectedStageFeatures] = useState([]);
const [selectedEntNeeds, setSelectedEntNeeds] = useState([]);
const [selectedGenres, setSelectedGenres] = useState([]);
const [bookingFreq, setBookingFreq] = useState(null);
const [customStageFeature, setCustomStageFeature] = useState('');
const [customEntNeed, setCustomEntNeed] = useState('');
const [customGenre, setCustomGenre] = useState('');
const [submitted, setSubmitted] = useState(false);

const totalSteps = 5;
const stepLabels = ['Venue Info', 'Stage & Tech', 'Entertainment', 'Media & Bio', 'Review'];

const updateForm = (key, val) => setForm(prev => ({ ...prev, [key]: val }));
const toggleItem = (list, setList, item) => setList(prev => prev.includes(item) ? prev.filter(x => x !== item) : [...prev, item]);
const addCustom = (val, list, setList, setInput) => { if (val.trim() && !list.includes(val.trim())) { setList(prev => [...prev, val.trim()]); } setInput(''); };

const goTo = (s) => { setStep(s); window.scrollTo(0, 0); };

// SUCCESS
if (submitted) {
  return (
    <div style={{ padding: '80px 24px', textAlign: 'center' }}>
      <div style={{ fontSize: 64, marginBottom: 16 }}>🏛️</div>
      <h2 style={{ fontSize: 28, fontWeight: 800, marginBottom: 8 }}>{form.venueName || 'Your Venue'} is Live!</h2>
      <p style={{ color: 'var(--text-muted)', fontSize: 15, maxWidth: 460, margin: '0 auto 32px', lineHeight: 1.6 }}>Talent and agents can now discover your venue. Post your first gig or start browsing performers.</p>
      <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
        <button className="btn btn-accent" onClick={() => setPage('gigs')}><i className="fa-solid fa-clipboard-list"></i> Post a Gig</button>
        <button className="btn btn-primary" onClick={() => setPage('browse')}><i className="fa-solid fa-search"></i> Find Talent</button>
        <button className="btn btn-outline" onClick={() => setPage('booker')}><i className="fa-solid fa-building"></i> Booker Hub</button>
      </div>
    </div>
  );
}

return (
<div style={{ padding: '40px 24px 80px', maxWidth: 700, margin: '0 auto' }}>
  <div style={{ textAlign: 'center', marginBottom: 36 }}>
    <h1 style={{ fontSize: 26, fontWeight: 800, marginBottom: 4 }}>Venue Profile Setup</h1>
    <p style={{ color: 'var(--text-muted)', fontSize: 14 }}>List your venue and start booking the best entertainment</p>
  </div>

  <OnboardingProgress step={step} totalSteps={totalSteps} labels={stepLabels} />

  {/* STEP 1: Venue Info */}
  {step === 0 && (
    <OnboardingWizardCard>
      <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 6 }}>About Your Venue</h2>
      <p style={{ color: 'var(--text-muted)', fontSize: 14, marginBottom: 24, lineHeight: 1.5 }}>Basic details so talent and agents can find and contact you.</p>

      <OnboardingInput label="Venue Name" placeholder="e.g., The Blue Note Jazz Club" value={form.venueName} onChange={e => updateForm('venueName', e.target.value)} />

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        <OnboardingInput label="Contact Name" placeholder="e.g., Sarah Chen" value={form.contactName} onChange={e => updateForm('contactName', e.target.value)} />
        <OnboardingInput label="Title / Role" placeholder="e.g., Entertainment Director" value={form.contactTitle} onChange={e => updateForm('contactTitle', e.target.value)} />
      </div>

      <OnboardingInput label="Phone Number" placeholder="+1 (555) 123-4567" value={form.phone} onChange={e => updateForm('phone', e.target.value)} />
      <OnboardingInput label="Booking Email" placeholder="booking@yourvenue.com" hint="This is the email talent and agents will use to reach you" value={form.email} onChange={e => updateForm('email', e.target.value)} />
      <OnboardingInput label="Street Address" placeholder="123 Main Street" value={form.address} onChange={e => updateForm('address', e.target.value)} />

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        <OnboardingInput label="City" placeholder="e.g., New York" value={form.city} onChange={e => updateForm('city', e.target.value)} />
        <OnboardingInput label="State / Country" placeholder="e.g., NY, USA" value={form.stateCountry} onChange={e => updateForm('stateCountry', e.target.value)} />
      </div>

      <div style={{ marginBottom: 20 }}>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 8 }}>Venue Type</label>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          {VENUE_TYPES.map(t => (
            <OnboardingChip key={t} label={t} selected={venueType === t} onClick={() => setVenueType(venueType === t ? null : t)} />
          ))}
        </div>
      </div>

      <div style={{ marginBottom: 8 }}>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 8 }}>Capacity</label>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          {VENUE_CAPACITY.map(c => (
            <OnboardingChip key={c} label={c} selected={capacity === c} onClick={() => setCapacity(capacity === c ? null : c)} />
          ))}
        </div>
      </div>

      <OnboardingBtnRow onNext={() => goTo(1)} />
    </OnboardingWizardCard>
  )}

  {/* STEP 2: Stage & Technical */}
  {step === 1 && (
    <OnboardingWizardCard>
      <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 6 }}>Stage & Technical</h2>
      <p style={{ color: 'var(--text-muted)', fontSize: 14, marginBottom: 24, lineHeight: 1.5 }}>Help performers know what to expect when they play your venue.</p>

      <div style={{ marginBottom: 24 }}>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 4 }}>Stage & Facilities</label>
        <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 10, opacity: 0.7 }}>Select everything your venue provides</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          {[...new Set([...STAGE_FEATURES, ...selectedStageFeatures.filter(f => !STAGE_FEATURES.includes(f))])].map(f => (
            <OnboardingChip key={f} label={f} selected={selectedStageFeatures.includes(f)} onClick={() => toggleItem(selectedStageFeatures, setSelectedStageFeatures, f)} />
          ))}
        </div>
        <OnboardingAddRow value={customStageFeature} onChange={e => setCustomStageFeature(e.target.value)} onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), addCustom(customStageFeature, selectedStageFeatures, setSelectedStageFeatures, setCustomStageFeature))} onAdd={() => addCustom(customStageFeature, selectedStageFeatures, setSelectedStageFeatures, setCustomStageFeature)} placeholder="Add a custom feature..." />
      </div>

      <div style={{ marginBottom: 20 }}>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 6 }}>Additional Stage Notes</label>
        <textarea placeholder="Anything else performers should know — stage dimensions, power supply, load-in details, parking, curfew..." rows="3" style={{ width: '100%', padding: '12px 14px', background: 'var(--dark-lighter)', border: '1px solid var(--dark-border)', borderRadius: 10, color: 'var(--text)', fontSize: 14, resize: 'vertical', minHeight: 80, outline: 'none', fontFamily: 'inherit' }}></textarea>
        <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4, opacity: 0.7 }}>This saves talent from asking — and speeds up booking</div>
      </div>

      <OnboardingBtnRow onBack={() => goTo(0)} onNext={() => goTo(2)} />
    </OnboardingWizardCard>
  )}

  {/* STEP 3: Entertainment Needs */}
  {step === 2 && (
    <OnboardingWizardCard>
      <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 6 }}>Entertainment Needs</h2>
      <p style={{ color: 'var(--text-muted)', fontSize: 14, marginBottom: 24, lineHeight: 1.5 }}>Tell us what you're looking for so we can match you with the right talent.</p>

      <div style={{ marginBottom: 24 }}>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 4 }}>Types of Entertainment</label>
        <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 10, opacity: 0.7 }}>What kinds of acts do you book?</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          {[...new Set([...ENTERTAINMENT_NEEDS, ...selectedEntNeeds.filter(n => !ENTERTAINMENT_NEEDS.includes(n))])].map(n => (
            <OnboardingChip key={n} label={n} selected={selectedEntNeeds.includes(n)} onClick={() => toggleItem(selectedEntNeeds, setSelectedEntNeeds, n)} />
          ))}
        </div>
        <OnboardingAddRow value={customEntNeed} onChange={e => setCustomEntNeed(e.target.value)} onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), addCustom(customEntNeed, selectedEntNeeds, setSelectedEntNeeds, setCustomEntNeed))} onAdd={() => addCustom(customEntNeed, selectedEntNeeds, setSelectedEntNeeds, setCustomEntNeed)} placeholder="Add a custom entertainment type..." />
      </div>

      <div style={{ marginBottom: 24 }}>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 4 }}>Preferred Genres</label>
        <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 10, opacity: 0.7 }}>What genres work best for your venue and audience?</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          {[...new Set([...GENRE_OPTIONS, ...BAND_GENRES.filter(g => !GENRE_OPTIONS.includes(g)), ...selectedGenres.filter(g => !GENRE_OPTIONS.includes(g) && !BAND_GENRES.includes(g))])].map(g => (
            <OnboardingChip key={g} label={g} selected={selectedGenres.includes(g)} onClick={() => toggleItem(selectedGenres, setSelectedGenres, g)} />
          ))}
        </div>
        <OnboardingAddRow value={customGenre} onChange={e => setCustomGenre(e.target.value)} onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), addCustom(customGenre, selectedGenres, setSelectedGenres, setCustomGenre))} onAdd={() => addCustom(customGenre, selectedGenres, setSelectedGenres, setCustomGenre)} placeholder="Add a custom genre..." />
      </div>

      <div style={{ marginBottom: 24 }}>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 8 }}>How Often Do You Book Entertainment?</label>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
          {BOOKING_FREQUENCY.map(f => (
            <OnboardingChip key={f} label={f} selected={bookingFreq === f} onClick={() => setBookingFreq(bookingFreq === f ? null : f)} />
          ))}
        </div>
      </div>

      <div style={{ marginBottom: 20 }}>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 8 }}>Typical Budget Range Per Booking</label>
        <div style={{ display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
          <div style={{ flex: 1, minWidth: 120 }}>
            <input placeholder="Min ($)" value={form.budgetMin} onChange={e => updateForm('budgetMin', e.target.value)} style={{ width: '100%', padding: '12px 14px', background: 'var(--dark-lighter)', border: '1px solid var(--dark-border)', borderRadius: 10, color: 'var(--text)', fontSize: 14, outline: 'none' }} />
          </div>
          <span style={{ color: 'var(--text-muted)', fontSize: 14 }}>to</span>
          <div style={{ flex: 1, minWidth: 120 }}>
            <input placeholder="Max ($)" value={form.budgetMax} onChange={e => updateForm('budgetMax', e.target.value)} style={{ width: '100%', padding: '12px 14px', background: 'var(--dark-lighter)', border: '1px solid var(--dark-border)', borderRadius: 10, color: 'var(--text)', fontSize: 14, outline: 'none' }} />
          </div>
          <select value={form.budgetPer} onChange={e => updateForm('budgetPer', e.target.value)} style={{ padding: '12px 14px', background: 'var(--dark-lighter)', border: '1px solid var(--dark-border)', borderRadius: 10, color: 'var(--text)', fontSize: 14, outline: 'none', minWidth: 130 }}>
            <option value="per act">Per Act</option>
            <option value="per night">Per Night</option>
            <option value="per event">Per Event</option>
            <option value="varies">Varies</option>
          </select>
        </div>
        <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 6, opacity: 0.7 }}>This helps talent know if they're in range — only visible to matched talent</div>
      </div>

      <OnboardingBtnRow onBack={() => goTo(1)} onNext={() => goTo(3)} />
    </OnboardingWizardCard>
  )}

  {/* STEP 4: Media & Bio */}
  {step === 3 && (
    <OnboardingWizardCard>
      <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 6 }}>Media & Bio</h2>
      <p style={{ color: 'var(--text-muted)', fontSize: 14, marginBottom: 24, lineHeight: 1.5 }}>Show talent what your venue looks and feels like.</p>

      <div style={{ marginBottom: 20 }}>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 6 }}>Venue Photos</label>
        <div style={{ border: '2px dashed var(--dark-border)', borderRadius: 12, padding: 28, textAlign: 'center', cursor: 'pointer', transition: 'border-color 0.3s' }}
          onMouseOver={e => e.currentTarget.style.borderColor = 'var(--primary-light)'}
          onMouseOut={e => e.currentTarget.style.borderColor = 'var(--dark-border)'}>
          <i className="fa-solid fa-images" style={{ fontSize: 28, color: 'var(--text-muted)', display: 'block', marginBottom: 8 }}></i>
          <div style={{ color: 'var(--text-muted)', fontSize: 13 }}><span style={{ color: 'var(--primary-light)', fontWeight: 600 }}>Upload photos</span> of your venue, stage, and audience<br/>PNG, JPG up to 5MB each — upload multiple</div>
        </div>
      </div>

      <div style={{ marginBottom: 20 }}>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 6 }}>Venue Video / Virtual Tour</label>
        <div style={{ border: '2px dashed var(--dark-border)', borderRadius: 12, padding: 28, textAlign: 'center', cursor: 'pointer', transition: 'border-color 0.3s' }}
          onMouseOver={e => e.currentTarget.style.borderColor = 'var(--primary-light)'}
          onMouseOut={e => e.currentTarget.style.borderColor = 'var(--dark-border)'}>
          <i className="fa-solid fa-video" style={{ fontSize: 28, color: 'var(--text-muted)', display: 'block', marginBottom: 8 }}></i>
          <div style={{ color: 'var(--text-muted)', fontSize: 13 }}><span style={{ color: 'var(--primary-light)', fontWeight: 600 }}>Upload a video</span> or paste a link<br/>Great for showing the vibe, layout, and crowd</div>
        </div>
        <input placeholder="Or paste a video URL (YouTube, Vimeo)" style={{ width: '100%', padding: '10px 14px', background: 'var(--dark-lighter)', border: '1px solid var(--dark-border)', borderRadius: 10, color: 'var(--text)', fontSize: 13, outline: 'none', marginTop: 8 }} />
      </div>

      <div style={{ marginBottom: 20 }}>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 6 }}>Venue Description</label>
        <textarea placeholder="Tell talent about your venue — the atmosphere, your audience, what makes a great show here, any notable past performances..." rows="5" value={form.bio} onChange={e => updateForm('bio', e.target.value)} style={{ width: '100%', padding: '12px 14px', background: 'var(--dark-lighter)', border: '1px solid var(--dark-border)', borderRadius: 10, color: 'var(--text)', fontSize: 14, resize: 'vertical', minHeight: 120, outline: 'none', fontFamily: 'inherit' }}></textarea>
        <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 4, opacity: 0.7 }}>Performers want to know your vibe — help them picture themselves on your stage</div>
      </div>

      <div style={{ marginBottom: 4 }}>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: 'var(--text-muted)', marginBottom: 8 }}>Social & Web Links</label>
        <OnboardingInput label="" placeholder="Website URL" value={form.website} onChange={e => updateForm('website', e.target.value)} />
        <OnboardingInput label="" placeholder="Instagram URL" value={form.instagram} onChange={e => updateForm('instagram', e.target.value)} />
        <OnboardingInput label="" placeholder="Facebook URL" value={form.facebook} onChange={e => updateForm('facebook', e.target.value)} />
        <OnboardingInput label="" placeholder="YouTube Channel" value={form.youtube} onChange={e => updateForm('youtube', e.target.value)} />
        <OnboardingInput label="" placeholder="TikTok URL" value={form.tiktok} onChange={e => updateForm('tiktok', e.target.value)} />
      </div>

      <OnboardingBtnRow onBack={() => goTo(2)} onNext={() => goTo(4)} nextLabel="Review" />
    </OnboardingWizardCard>
  )}

  {/* STEP 5: Review */}
  {step === 4 && (
    <OnboardingWizardCard>
      <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 6 }}>Review Your Venue Profile</h2>
      <p style={{ color: 'var(--text-muted)', fontSize: 14, marginBottom: 24, lineHeight: 1.5 }}>Make sure everything looks good before going live.</p>

      {[
        { section: 'Venue Info', rows: [
          { key: 'Venue Name', val: form.venueName || '—', editStep: 0 },
          { key: 'Contact', val: form.contactName ? `${form.contactName} (${form.contactTitle || 'Primary Contact'})` : '—', editStep: 0 },
          { key: 'Location', val: [form.city, form.stateCountry].filter(Boolean).join(', ') || '—', editStep: 0 },
          { key: 'Type', val: venueType || '—', editStep: 0 },
          { key: 'Capacity', val: capacity || '—', editStep: 0 },
        ]},
        { section: 'Stage & Technical', rows: [
          { key: 'Features', val: selectedStageFeatures.length > 0 ? selectedStageFeatures.slice(0, 4).join(', ') + (selectedStageFeatures.length > 4 ? ` +${selectedStageFeatures.length - 4} more` : '') : '—', editStep: 1 },
        ]},
        { section: 'Entertainment', rows: [
          { key: 'Looking For', val: selectedEntNeeds.length > 0 ? selectedEntNeeds.slice(0, 3).join(', ') + (selectedEntNeeds.length > 3 ? ` +${selectedEntNeeds.length - 3} more` : '') : '—', editStep: 2 },
          { key: 'Genres', val: selectedGenres.length > 0 ? selectedGenres.slice(0, 4).join(', ') + (selectedGenres.length > 4 ? ` +${selectedGenres.length - 4} more` : '') : '—', editStep: 2 },
          { key: 'Frequency', val: bookingFreq || '—', editStep: 2 },
          { key: 'Budget', val: form.budgetMin && form.budgetMax ? `$${form.budgetMin} – $${form.budgetMax} ${form.budgetPer}` : form.budgetPer === 'varies' ? 'Varies' : '—', editStep: 2 },
        ]},
      ].map((section, si) => (
        <div key={si} style={{ marginBottom: 24 }}>
          <h4 style={{ fontSize: 12, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 10, fontWeight: 600 }}>{section.section}</h4>
          {section.rows.map((row, ri) => (
            <div key={ri} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0', borderBottom: ri < section.rows.length - 1 ? '1px solid var(--dark-lighter)' : 'none' }}>
              <span style={{ color: 'var(--text-muted)', fontSize: 13 }}>{row.key}</span>
              <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ color: 'var(--text)', fontSize: 13, fontWeight: 600, textAlign: 'right', maxWidth: 250, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{row.val}</span>
                <span onClick={() => goTo(row.editStep)} style={{ color: 'var(--primary-light)', fontSize: 12, cursor: 'pointer' }}>Edit</span>
              </span>
            </div>
          ))}
        </div>
      ))}

      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 28 }}>
        <button className="btn btn-outline" onClick={() => goTo(3)}><i className="fa-solid fa-arrow-left" style={{ fontSize: 12 }}></i> Back</button>
        <button className="btn btn-accent btn-lg" onClick={() => setSubmitted(true)} style={{ fontWeight: 700 }}>Launch Venue Profile <i className="fa-solid fa-building-columns" style={{ fontSize: 14 }}></i></button>
      </div>
    </OnboardingWizardCard>
  )}
</div>
);
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
