*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {

--dark: #0F0F1A;

body {

background: var(--dark);
color: var(--text);
line-height: 1.6;
overflow-x: hidden;

a { color: var(--primary-light); text-decoration: none; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea {

background: var(--dark-lighter);
border: 1px solid var(--dark-border);
color: var(--text);
padding: 10px 14px;
border-radius: 8px;
font-size: 14px;
outline: none;
transition: border-color 0.2s;
width: 100%;
}
input:focus, select:focus, textarea:focus { border-color: var(--primary-light); }
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
/* Animations */
@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

.fade-in { animation: fadeInUp 0.6s ease-out both; }
.fade-in-delay-1 { animation-delay: 0.1s; }
.fade-in-delay-2 { animation-delay: 0.2s; }
.fade-in-delay-3 { animation-delay: 0.3s; }
.fade-in-delay-4 { animation-delay: 0.4s; }
/* Buttons */
.btn {
display: inline-flex; align-items: center; gap: 8px;
padding: 12px 24px; border-radius: 10px; font-weight: 600;
font-size: 14px; border: none; transition: all 0.3s;

.btn-primary { background: var(--pro-gradient); color: #fff; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108,43,217,0.4); }
.btn-accent { background: var(--premium-gradient); color: #000; }
.btn-accent:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245,158,11,0.4); }
.btn-outline { background: transparent; border: 2px solid var(--dark-border); color: var(--text); }
.btn-outline:hover { border-color: var(--primary-light); color: var(--primary-light); }
.btn-sm { padding: 8px 16px; font-size: 13px; }
.btn-lg { padding: 16px 36px; font-size: 16px; }
/* Cards */
.card {
background: var(--dark-card);
border: 1px solid var(--dark-border);
border-radius: 16px;
padding: 24px;
transition: all 0.3s;
}
.card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
/* Badge */
.badge {
display: inline-flex; align-items: center; gap: 4px;
padding: 4px 10px; border-radius: 20px; font-size: 11px;

.badge-pro { background: rgba(108,43,217,0.2); color: var(--primary-light); }

.badge-category { background: rgba(108,43,217,0.15); color: var(--primary-light); border: 1px solid rgba(108,43,217,0.3); }
/* Star Rating */
.stars { color: var(--accent); font-size: 13px; }
.stars .empty { color: var(--dark-border); }
/* Avatar */
.avatar {
width: 48px; height: 48px; border-radius: 50%;
background: var(--pro-gradient); display: flex; align-items: center;
justify-content: center; font-weight: 700; font-size: 18px; color: #fff;

.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

const API_BASE = '/api';
const CALENDAR_BASE = 'https://calendar.stagelink365.com/c';

async function apiGet(path) {
  const res = await fetch(`${API_BASE}${path}`);
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

async function apiPost(path, body, authToken) {
  const headers = { 'Content-Type': 'application/json' };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const res = await fetch(`${API_BASE}${path}`, { method: 'POST', headers, body: JSON.stringify(body) });
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

async function apiPatch(path, body) {
  const res = await fetch(`${API_BASE}${path}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

const [filterAvailability, setFilterAvailability] = useState(false);
const [filterTier, setFilterTier] = useState('all');

// Live data state
const [liveProfiles, setLiveProfiles] = useState([]);
const [loadingProfiles, setLoadingProfiles] = useState(true);
const [apiError, setApiError] = useState(null);

// Auth state
const [currentUser, setCurrentUser] = useState(null);
const [editingProfileId, setEditingProfileId] = useState(null);

// Fetch profiles from Airtable API
const fetchProfiles = useCallback(async () => {
  setLoadingProfiles(true);
  try {
    const data = await apiGet('/profiles');
    setLiveProfiles(data.profiles || []);
    setApiError(null);
  } catch (err) {
    console.warn('API not available, using sample data:', err.message);
    setApiError('api_unavailable');
    setLiveProfiles([]);
  }
  setLoadingProfiles(false);
}, []);

useEffect(() => { fetchProfiles(); }, [fetchProfiles]);

// Use live profiles if available, otherwise fall back to sample data
const profiles = liveProfiles.length > 0 ? liveProfiles : SAMPLE_PROFILES;
const isLiveData = liveProfiles.length > 0;

const viewProfile = (profile) => { setSelectedProfile(profile); setPage('profile'); window.scrollTo(0,0); };
const viewGig = (gig) => { setSelectedGig(gig); };

const handleLogin = (user) => { setCurrentUser(user); setShowLogin(false); setPage('dashboard'); };
const handleLogout = () => { setCurrentUser(null); setPage('home'); };

const handleProfileCreated = (result) => {
  setShowCreateProfile(false);
  fetchProfiles();
  if (result && result.profile) {
    setCurrentUser({ id: result.profile.id, name: result.profile.name, email: result.profile.email, role: 'performer', token: result.profile.token });
  }
  setPage('dashboard');
};

return (
<div>
<Navbar page={page} setPage={setPage} onLogin={() => setShowLogin(true)} onCreateProfile={() => setShowCreateProfile(true)} currentUser={currentUser} onLogout={handleLogout} />
{page === 'home' && <HomePage setPage={setPage} onCreateProfile={() => setShowCreateProfile(true)} profiles={profiles} isLiveData={isLiveData} />}
{page === 'browse' && (

onViewProfile={viewProfile}

/>
)}
{page === 'profile' && selectedProfile && <ProfilePage profile={selectedProfile} onBack={() => setPage('browse')} currentUser={currentUser} onEdit={() => { setEditingProfileId(selectedProfile.id); setShowEditProfile(true); }} />}
{page === 'gigs' && <GigsPage onViewGig={viewGig} />}
{page === 'pricing' && <PricingPage onCreateProfile={() => setShowCreateProfile(true)} />}
{page === 'dashboard' && <DashboardPage onViewProfile={viewProfile} currentUser={currentUser} profiles={profiles} onEditProfile={(profileId) => { setEditingProfileId(profileId); setShowEditProfile(true); }} onLogin={() => setShowLogin(true)} />}

function Stars({ rating }) {
const full = Math.floor(rating);
const half = rating % 1 >= 0.5 ? 1 : 0;
const empty = 5 - full - half;
return (
<span className="stars">
{[...Array(full)].map((_, i) => <i key={`f${i}`} className="fa-solid fa-star"></i>)}
{half > 0 && <i className="fa-solid fa-star-half-stroke"></i>}
{[...Array(empty)].map((_, i) => <i key={`e${i}`} className="fa-regular fa-star empty"></i>)}
</span>
);
}

function BrowsePage({ searchQuery, setSearchQuery, filterCategory, setFilterCategory, filterLocation, setFilterLocation, filterAvailability, setFilterAvailability, filterTier, setFilterTier, onViewProfile, profiles, loading, isLiveData }) {
const filtered = useMemo(() => {
return profiles.filter(p => {
if (searchQuery) {
const q = searchQuery.toLowerCase();
const match = p.name.toLowerCase().includes(q) || p.subcategories.some(s => s.toLowerCase().includes(q)) || p.bio.toLowerCase().includes(q) || (p.genres && p.genres.some(g => g.toLowerCase().includes(q))) || p.skills.some(s => s.toLowerCase().includes(q));
if (!match) return false;
}
if (filterCategory !== 'all' && p.category !== filterCategory) return false;
if (filterLocation !== 'all' && p.location !== filterLocation) return false;
if (filterAvailability && !p.available) return false;
if (filterTier !== 'all' && p.tier !== filterTier) return false;
return true;
}).sort((a, b) => {
if (a.tier === 'premium' && b.tier !== 'premium') return -1;
if (b.tier === 'premium' && a.tier !== 'premium') return 1;
if (a.tier === 'pro' && b.tier === 'free') return -1;
if (b.tier === 'pro' && a.tier === 'free') return 1;
return b.rating - a.rating;
});
}, [searchQuery, filterCategory, filterLocation, filterAvailability, filterTier]);

return (

function LoginModal({ onClose, onSuccess }) {

const handleLogin = async () => {
  if (!loginToken.trim()) { setLoginError('Please enter your access token'); return; }
  setLoading(true); setLoginError('');
  try {
    const data = await apiPost('/auth', { token: loginToken.trim() });
    if (data.authenticated) {
      onSuccess({ ...data.profile, role: data.role, token: loginToken.trim() });

  } catch (err) {
    setLoginError('Invalid token. Check your magic link or contact TAD Shows.');

};

function EditProfileModal({ profileId, token, onClose, onSaved }) {
const [loading, setLoading] = useState(true);
const [saving, setSaving] = useState(false);
const [error, setError] = useState('');
const [formData, setFormData] = useState({
  name: '', email: '', phone: '', category: '', subcategories: [], location: '', state: '',
  bio: '', rateMin: '', rateMax: '', rateType: '', yearsExp: '', travelRadius: '',
  genres: [], skills: [], unions: [], equipment: '', recentVenues: '', available: true,
  videoLink: '', showReelLink: '', audioLink: ''
});
const update = (key, val) => setFormData(prev => ({ ...prev, [key]: val }));
const toggleArrayItem = (key, item) => update(key, formData[key].includes(item) ? formData[key].filter(x => x !== item) : [...formData[key], item]);

useEffect(() => {
  if (!profileId) return;
  (async () => {
    try {
      const data = await apiGet(`/profile?id=${profileId}`);
      const p = data.profile;
      setFormData({
        name: p.name || '', email: p.email || '', phone: p.phone || '',
        category: p.category || '', subcategories: p.subcategories || [],
        location: p.location || '', state: p.state || '',
        bio: p.bio || '', rateMin: '', rateMax: '', rateType: '',
        yearsExp: p.yearsExp || '', travelRadius: p.travel ? parseInt(p.travel) || '' : '',
        genres: p.genres || [], skills: p.skills || [], unions: p.unions || [],
        equipment: (p.equipment || []).join('\n'), recentVenues: (p.recentVenues || []).join('\n'),
        available: p.available !== false,
        videoLink: p.videoLink || '', showReelLink: p.showReelLink || '', audioLink: p.audioLink || ''
      });
    } catch (err) { setError('Could not load profile'); }
    setLoading(false);
  })();
}, [profileId]);

const handleSave = async () => {
  setSaving(true); setError('');
  try {
    const fields = {
      name: formData.name, email: formData.email, phone: formData.phone,
      category: formData.category, subcategories: formData.subcategories,
      location: formData.location, state: formData.state,
      bio: formData.bio, yearsExp: formData.yearsExp ? parseInt(formData.yearsExp) : undefined,
      travelRadius: formData.travelRadius ? parseInt(formData.travelRadius) : undefined,
      genres: formData.genres, skills: formData.skills, unions: formData.unions,
      equipment: formData.equipment.split('\n').filter(Boolean),
      recentVenues: formData.recentVenues.split('\n').filter(Boolean),
      available: formData.available,
      videoLink: formData.videoLink || '',
      showReelLink: formData.showReelLink || '',
      audioLink: formData.audioLink || ''
    };
    if (formData.rateMin) fields.rateMin = parseFloat(formData.rateMin);
    if (formData.rateMax) fields.rateMax = parseFloat(formData.rateMax);
    if (formData.rateType) fields.rateType = formData.rateType;
    await apiPatch('/profile', { id: profileId, fields, token });
    onSaved();
  } catch (err) { setError('Failed to save. Please try again.'); }
  setSaving(false);
};

if (loading) return (
<div className="modal-overlay"><div className="modal" style={{ textAlign: 'center', padding: 60 }}>
<i className="fa-solid fa-spinner fa-spin" style={{ fontSize: 32, color: 'var(--primary-light)', marginBottom: 16 }}></i>
<p style={{ color: 'var(--text-muted)' }}>Loading profile...</p>
</div></div>
);

return (
<div className="modal-overlay" onClick={onClose}>
<div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 640, maxHeight: '85vh', overflowY: 'auto' }}>
<div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
<h2 style={{ fontSize: 22, fontWeight: 700 }}>Edit Profile</h2>
<button onClick={onClose} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', fontSize: 20, cursor: 'pointer' }}><i className="fa-solid fa-xmark"></i></button>
</div>

<div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>

const [showCompose, setShowCompose] = useState(false);
const messagesEndRef = useRef(null);

const allMessages = [...activeConvo.messages, ...(localMessages[activeConvo.id] || [])];

const sendMessage = () => {
if (!newMessage.trim()) return;
const msg = { from: 'me', text: newMessage, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), date: 'Today' };
setLocalMessages(prev => ({ ...prev, [activeConvo.id]: [...(prev[activeConvo.id] || []), msg] }));
setNewMessage('');
};

return (
<div style={{ padding: '32px 0', minHeight: '100vh' }}>

placeholder={`Message ${activeConvo.with}...`}
style={{ paddingRight: 40 }} />
</div>
<button onClick={sendMessage} className="btn btn-primary btn-sm" style={{ padding: '10px 16px' }}><i className="fa-solid fa-paper-plane"></i></button>
</div>
</div>
</div>

{/* Compose New Modal */}
{showCompose && (
<div className="modal-overlay" onClick={() => setShowCompose(false)}>
